<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live AR Consultation - Evia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            100: '#fefae0', /* Cornsilk */
                            200: '#e9edc9', /* Beige */
                            300: '#faedcd', /* Papaya Whip */
                            400: '#ccd5ae', /* Tea Green */
                            500: '#d4a373', /* Light Bronze */
                        },
                        foreground: '#4a3b2c'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-brand-100 text-foreground min-h-screen">
    <div class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-foreground">Live AR Analysis</h1>
            <a href="http://localhost:3000" class="text-sm font-bold text-foreground/80 hover:text-brand-500">Back to Home</a>
        </div>

        <div class="bg-brand-100 rounded-3xl p-8 border border-brand-200 shadow-sm text-center">
            <div class="aspect-video bg-[#4a3b2c] rounded-2xl overflow-hidden shadow-inner relative max-w-2xl mx-auto mb-8 border-4 border-brand-200">
                <!-- Using img to display the mjpeg stream from Flask -->
                <img src="{{ url_for('video_feed') }}" alt="Live Feed" class="w-full h-full object-cover">
            </div>

            <div class="flex justify-center gap-4">
                <form action="{{ url_for('live_ar') }}" method="POST">
                    {% if live_mode %}
                        <input type="hidden" name="mode" value="stop">
                        <button type="submit" class="px-6 py-3 bg-red-50 text-red-600 font-bold rounded-xl hover:brightness-95 transition-colors border border-red-200">
                            Stop AR Overlay
                        </button>
                    {% else %}
                        <input type="hidden" name="mode" value="live">
                        <button type="submit" class="px-6 py-3 bg-brand-200 text-brand-500 font-bold rounded-xl hover:bg-brand-300 transition-colors">
                            Start AR Overlay
                        </button>
                    {% endif %}
                </form>

                <button onclick="captureImage()" class="px-6 py-3 bg-brand-400 text-[#4a3b2c] font-bold rounded-xl hover:brightness-105 transition-colors flex items-center gap-2 shadow-sm">
                    <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Take Snapshot & Analyze
                </button>
            </div>
            
            <p id="status-msg" class="text-brand-500 mt-6 font-medium text-sm hidden">Processing image...</p>
        </div>
    </div>

    <script>
        function captureImage() {
            document.getElementById('status-msg').classList.remove('hidden');
            fetch("{{ url_for('capture') }}", {
                method: "POST"
            })
            .then(response => response.json())
            .then(data => {
                if(data.success && data.redirect_url) {
                    window.location.href = data.redirect_url;
                } else {
                    document.getElementById('status-msg').innerText = "Capture failed. Please try again.";
                    document.getElementById('status-msg').classList.add("text-red-500");
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-msg').innerText = "An error occurred.";
            });
        }
    </script>
</body>
</html>
